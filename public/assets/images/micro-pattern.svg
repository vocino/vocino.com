<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <style>
      .mg-border  { stroke: rgba(0,204,255,0.08);  fill: none; }
      .mg-primary { stroke: rgba(0,204,255,0.10);  fill: none; }
      .mg-dim     { stroke: rgba(230,237,243,0.05); fill: none; }
      .mg-reg     { stroke: rgba(0,204,255,0.18);   fill: none; }
      .mg-label   { font-family: monospace; font-size: 5px; fill: rgba(0,204,255,0.12); letter-spacing: 0.5px; }
      .mg-node    { fill: rgba(0,204,255,0.18); }
    </style>
  </defs>

  <!-- Tile border -->
  <rect x="0.25" y="0.25" width="159.5" height="159.5" class="mg-border" stroke-width="0.5"/>

  <!-- Fine secondary grid: vertical lines (skip 80, handled by subdivision) -->
  <line x1="16"  y1="0" x2="16"  y2="160" class="mg-dim" stroke-width="0.25"/>
  <line x1="32"  y1="0" x2="32"  y2="160" class="mg-dim" stroke-width="0.25"/>
  <line x1="48"  y1="0" x2="48"  y2="160" class="mg-dim" stroke-width="0.25"/>
  <line x1="64"  y1="0" x2="64"  y2="160" class="mg-dim" stroke-width="0.25"/>
  <line x1="96"  y1="0" x2="96"  y2="160" class="mg-dim" stroke-width="0.25"/>
  <line x1="112" y1="0" x2="112" y2="160" class="mg-dim" stroke-width="0.25"/>
  <line x1="128" y1="0" x2="128" y2="160" class="mg-dim" stroke-width="0.25"/>
  <line x1="144" y1="0" x2="144" y2="160" class="mg-dim" stroke-width="0.25"/>

  <!-- Fine secondary grid: horizontal lines (skip 80) -->
  <line x1="0" y1="16"  x2="160" y2="16"  class="mg-dim" stroke-width="0.25"/>
  <line x1="0" y1="32"  x2="160" y2="32"  class="mg-dim" stroke-width="0.25"/>
  <line x1="0" y1="48"  x2="160" y2="48"  class="mg-dim" stroke-width="0.25"/>
  <line x1="0" y1="64"  x2="160" y2="64"  class="mg-dim" stroke-width="0.25"/>
  <line x1="0" y1="96"  x2="160" y2="96"  class="mg-dim" stroke-width="0.25"/>
  <line x1="0" y1="112" x2="160" y2="112" class="mg-dim" stroke-width="0.25"/>
  <line x1="0" y1="128" x2="160" y2="128" class="mg-dim" stroke-width="0.25"/>
  <line x1="0" y1="144" x2="160" y2="144" class="mg-dim" stroke-width="0.25"/>

  <!-- Major subdivision cross at (80,80) -->
  <line x1="80" y1="0"   x2="80"  y2="160" class="mg-primary" stroke-width="0.25"/>
  <line x1="0"  y1="80"  x2="160" y2="80"  class="mg-primary" stroke-width="0.25"/>

  <!-- Corner registration L-brackets (all 4 corners) -->
  <!-- Top-left -->
  <polyline points="4,12 4,4 12,4" class="mg-reg" stroke-width="0.75"/>
  <!-- Top-right -->
  <polyline points="148,4 156,4 156,12" class="mg-reg" stroke-width="0.75"/>
  <!-- Bottom-left -->
  <polyline points="4,148 4,156 12,156" class="mg-reg" stroke-width="0.75"/>
  <!-- Bottom-right -->
  <polyline points="156,148 156,156 148,156" class="mg-reg" stroke-width="0.75"/>

  <!-- Center crosshair target at (80,80) -->
  <circle cx="80" cy="80" r="6"   class="mg-primary" stroke-width="0.5"/>
  <circle cx="80" cy="80" r="1.5" class="mg-primary" stroke-width="0.5"/>
  <!-- N/S/E/W tick marks -->
  <line x1="80" y1="71" x2="80" y2="74" class="mg-primary" stroke-width="0.5"/>
  <line x1="80" y1="86" x2="80" y2="89" class="mg-primary" stroke-width="0.5"/>
  <line x1="71" y1="80" x2="74" y2="80" class="mg-primary" stroke-width="0.5"/>
  <line x1="86" y1="80" x2="89" y2="80" class="mg-primary" stroke-width="0.5"/>

  <!-- Measurement bracket on top edge -->
  <line x1="40"  y1="4" x2="40"  y2="10" class="mg-primary" stroke-width="0.5"/>
  <line x1="40"  y1="7" x2="120" y2="7"  class="mg-primary" stroke-width="0.5"/>
  <line x1="120" y1="4" x2="120" y2="10" class="mg-primary" stroke-width="0.5"/>

  <!-- 45-degree circuit trace terminating in solder node -->
  <line x1="0" y1="120" x2="40" y2="80" class="mg-primary" stroke-width="0.5"/>
  <circle cx="40" cy="80" r="1.5" class="mg-node"/>

  <!-- Dashed horizontal scan line -->
  <line x1="16" y1="40" x2="144" y2="40" class="mg-dim" stroke-width="0.25" stroke-dasharray="2 4"/>

  <!-- Tiny monospace text labels -->
  <text x="8"   y="150" class="mg-label">REF</text>
  <text x="130" y="18"  class="mg-label">&#9651;</text>
  <text x="136" y="84"  class="mg-label">01</text>
</svg>
